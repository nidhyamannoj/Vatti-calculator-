<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interest Calculator</title>
    
    <!-- 1. CSS STYLES -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .calculator-card {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .seo-text h3 {
            font-size: 1.3rem;
            color: #1a237e;
            margin-bottom: 8px;
            text-align: center;
        }

        .seo-text p {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
            text-align: center;
            margin-bottom: 24px;
        }

        .g {
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        select {
            width: 100%;
            padding: 12px 14px;
            font-size: 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            background-color: #fff;
            color: #2d3748;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            border-color: #3f51b5;
            box-shadow: 0 0 0 3px rgba(63, 81, 181, 0.15);
        }

        .date-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .calc-btn {
            width: 100%;
            background-color: #3f51b5;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .calc-btn:hover {
            background-color: #303f9f;
        }

        .res {
            display: none;
            margin-top: 24px;
            padding: 16px;
            background-color: #f8fafc;
            border-left: 4px solid #b71c1c;
            border-radius: 0 8px 8px 0;
        }

        .res p {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .res p:last-child {
            margin-bottom: 0;
            padding-top: 8px;
            border-top: 1px dashed #e2e8f0;
        }

        #outInterest, #outTotal {
            font-weight: bold;
            color: #b71c1c;
        }

        .wa-btn {
            display: none;
            text-align: center;
            width: 100%;
            background-color: #25D366;
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            margin-top: 14px;
            transition: background 0.2s;
        }

        .wa-btn:hover {
            background-color: #1ebd58;
        }

        .lang-container {
            margin-top: 24px;
            display: flex;
            justify-content: center;
        }

        .lang-btn {
            background: none;
            border: none;
            color: #5c6bc0;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
        }

        .lang-btn:hover {
            color: #3f51b5;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <!-- 2. HTML LAYOUT -->
    <div class="seo-text">
        <h3 id="sTitle">தமிழ்நாடு கிராமப்புற தனி மற்றும் கூட்டு வட்டி கணக்கீடு</h3>
        <p id="sDesc">Compute traditional Roopa/Paisa Vatti and Bank interest scales dynamically.</p>
    </div>

    <!-- Interest Type Dropdown is now FIRST -->
    <div class="g">
        <label id="l3">வட்டி வகை (Interest Type):</label>
        <select id="calcType" onchange="updatePlaceholderAndLabels()">
            <option value="roopa" selected>ரூபாய்/பைசா வட்டி (தனி வட்டி / மாதத்திற்கு)</option>
            <option value="bank">Bank வட்டி (கூட்டு வட்டி / ஆண்டிற்கு)</option>
        </select>
    </div>

    <div class="g">
        <label id="l1">அசல் தொகை (Principal):</label>
        <input type="text" id="asal" placeholder="எ.கா. 1,00,000" oninput="formatAsalCommas(this)">
    </div>
    
    <div class="g">
        <label id="l2">வட்டி விகிதம் (மாதத்திற்கு ₹100-க்கு):</label>
        <input type="number" id="vattiRate" step="0.01" placeholder="எ.கா. 2 அல்லது 3 ரூபாய்">
    </div>

    <div class="date-container">
        <div class="g">
            <label id="l4">தொடங்கிய தேதி:</label>
            <input type="date" id="sd">
        </div>
        <div class="g">
            <label id="l5">முடிவுற்ற தேதி:</label>
            <input type="date" id="ed">
        </div>
    </div>
    
    <button class="calc-btn" id="btn" onclick="calcRunMath()">வட்டியைக் கணக்கிடு</button>
    
    <div class="res" id="out">
        <p><span id="r1">காலம்:</span><span id="outTime"></span></p>
        <p><span id="r2">வட்டி (Vatti):</span><span id="outInterest"></span></p>
        <p><span id="r3">மொத்தம் (Asal+Vatti):</span><span id="outTotal"></span></p>
    </div>

    <a id="waBtn" class="wa-btn" href="" target="_blank">WhatsApp வழியாக பகிரவும்</a>

    <div class="lang-container">
        <button id="tg" class="lang-btn" onclick="calcToggleLang()">Switch to English</button>
    </div>
</div>
<!-- 3. JAVASCRIPT LOGIC -->
<script>
    let isTamil = true; 

    // Dynamically updates placeholders when type changes
    function updatePlaceholderAndLabels() {
        const cType = document.getElementById('calcType').value;
        const rateLabel = document.getElementById('l2');
        const rateInput = document.getElementById('vattiRate');

        if (isTamil) {
            if (cType === 'roopa') {
                rateLabel.innerText = "வட்டி விகிதம் (மாதத்திற்கு ₹100-க்கு):";
                rateInput.placeholder = "எ.கா. 2 அல்லது 3 ரூபாய்";
            } else {
                rateLabel.innerText = "வட்டி விகிதம் (ஆண்டிற்கு %):";
                rateInput.placeholder = "எ.கா. 7.5 அல்லது 9 %";
            }
        } else {
            if (cType === 'roopa') {
                rateLabel.innerText = "Interest Rate (per Month per ₹100):";
                rateInput.placeholder = "e.g., 2 or 3 Rupees";
            } else {
                rateLabel.innerText = "Interest Rate (Annual %):";
                rateInput.placeholder = "e.g., 7.5 or 9 %";
            }
        }
    }

    function formatAsalCommas(input) {
        let value = input.value.replace(/,/g, '');
        if(!isNaN(value) && value !== '') {
            input.value = parseFloat(value).toLocaleString('en-IN');
        } else {
            input.value = '';
        }
    }

    function calcRunMath() {
        const asalRawText = document.getElementById('asal')?.value || '0';
        const pVal = parseFloat(asalRawText.replace(/,/g, '')) || 0;
        const rateVal = parseFloat(document.getElementById('vattiRate')?.value || 0);
        const cType = document.getElementById('calcType')?.value || 'roopa';

        const startDateInput = document.getElementById('sd').value;
        const endDateInput = document.getElementById('ed').value;

        if (pVal <= 0 || rateVal <= 0) {
            alert(isTamil ? 'தயவுசெய்து சரியான அசல் மற்றும் வட்டி விகிதத்தை உள்ளிடவும்!' : 'Please enter a valid Principal and Interest Rate!');
            return;
        }
        if (!startDateInput || !endDateInput) {
            alert(isTamil ? 'தயவுசெய்து தேதிகளைத் தேர்ந்தெடுக்கவும்!' : 'Please select both dates!');
            return;
        }

        const d1 = new Date(startDateInput);
        const d2 = new Date(endDateInput);

        if (d2 < d1) {
            alert(isTamil ? 'முடிவுற்ற தேதி தொடங்கிய தேதியை விட அதிகமாக இருக்க வேண்டும்!' : 'End date must be after Start date!');
            return;
        }

        let diffY = d2.getFullYear() - d1.getFullYear();
        let diffM = d2.getMonth() - d1.getMonth();
        let diffD = d2.getDate() - d1.getDate();

        if (diffD < 0) {
            diffM--;
            const prevMonth = new Date(d2.getFullYear(), d2.getMonth(), 0).getDate();
            diffD += prevMonth;
        }
        if (diffM < 0) {
            diffY--;
            diffM += 12;
        }

        const totalMonths = (diffY * 12) + diffM + (diffD / 30);
        const totalYears = totalMonths / 12;

        let finalInterest = 0;
        let totalAmount = 0;

        if (cType === 'roopa') {
            // Traditional Thani Vatti (Simple Interest)
            finalInterest = pVal * (rateVal / 100) * totalMonths;
            totalAmount = pVal + finalInterest;
        } else {
            // Bank Kootu Vatti (Compound Interest - Annual Compounding standard)
            const annualRateDecimal = rateVal / 100;
            totalAmount = pVal * Math.pow((1 + annualRateDecimal), totalYears);
            finalInterest = totalAmount - pVal;
        }

        let parts = [];
        if (isTamil) {
            if (diffY > 0) parts.push(diffY === 1 ? `${diffY} ஆண்டு` : `${diffY} ஆண்டுகள்`);
            if (diffM > 0) parts.push(diffM === 1 ? `${diffM} மாதம்` : `${diffM} மாதங்கள்`);
            if (diffD > 0 || parts.length === 0) parts.push(diffD === 1 ? `${diffD} நாள்` : `${diffD} நாட்கள்`);
        } else {
            if (diffY > 0) parts.push(diffY === 1 ? `${diffY} Year` : `${diffY} Years`);
            if (diffM > 0) parts.push(diffM === 1 ? `${diffM} Month` : `${diffM} Months`);
            if (diffD > 0 || parts.length === 0) parts.push(diffD === 1 ? `${diffD} Day` : `${diffD} Days`);
        }
        let timeString = parts.join(', ');

        let displayInt = '₹' + finalInterest.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        let displayTot = '₹' + totalAmount.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});

        document.getElementById('outTime').innerText = " " + timeString;
        document.getElementById('outInterest').innerText = " " + displayInt;
        document.getElementById('outTotal').innerText = " " + displayTot;
        document.getElementById('out').style.display = 'block';
        
        let methodText = isTamil ? 
            (cType === 'roopa' ? 'ரூபாய்/பைசா வட்டி (தனி வட்டி)' : 'Bank வட்டி (கூட்டு வட்டி)') : 
            (cType === 'roopa' ? 'Roopa/Paisa Vatti (Simple Interest)' : 'Bank Vatti (Compound Interest)');

        let shareText = isTamil ? 
            `*வட்டி கணக்கீடு அறிக்கை*\n\nகணக்கீடு முறை: ${methodText}\nஅசல் தொகை: ₹${pVal.toLocaleString('en-IN')}\nகாலம்: ${timeString}\nவட்டி தொகை: ${displayInt}\nமொத்தம்: ${displayTot}` :
            `*Interest Report*\n\nMethod: ${methodText}\nPrincipal: ₹${pVal.toLocaleString('en-IN')}\nTime: ${timeString}\nInterest: ${displayInt}\nTotal: ${displayTot}`;
            
        let waButton = document.getElementById('waBtn');
        waButton.href = "https://whatsapp.com" + encodeURIComponent(shareText);
        waButton.style.display = 'block';
    }

    function calcToggleLang() {
        const langBtn = document.getElementById('tg');
        const calcTypeSelect = document.getElementById('calcType');
        isTamil = !isTamil;

        if (!isTamil) {
            langBtn.innerText = "தமிழ் மொழிக்கு மாற்றவும்";
            document.getElementById('l1').innerText = "Principal Amount:";
            document.getElementById('l3').innerText = "Interest Type:";
            document.getElementById('l4').innerText = "Start Date:";
            document.getElementById('l5').innerText = "End Date:";
            document.getElementById('btn').innerText = "Calculate Interest";
            document.getElementById('r1').innerText = "Duration:";
            document.getElementById('r2').innerText = "Interest (Vatti):";
            document.getElementById('r3').innerText = "Total (Principal+Vatti):";
            document.getElementById('waBtn').innerText = "Share via WhatsApp";
            document.getElementById('sTitle').innerText = "Rural Tamil Nadu Simple and Compound Interest Calculator";
            
            calcTypeSelect.options[0].text = "Roopa/Paisa Vatti (Simple Interest / Per Month)";
            calcTypeSelect.options[1].text = "Bank Vatti (Compound Interest / Per Year)";
        } else {
            langBtn.innerText = "Switch to English";
            document.getElementById('l1').innerText = "அசல் தொகை (Principal):";
            document.getElementById('l3').innerText = "வட்டி வகை (Interest Type):";
            document.getElementById('l4').innerText = "தொடங்கிய தேதி:";
            document.getElementById('l5').innerText = "முடிவுற்ற தேதி:";
            document.getElementById('btn').innerText = "வட்டியைக் கணக்கிடு";
            document.getElementById('r1').innerText = "காலம்:";
            document.getElementById('r2').innerText = "வட்டி (Vatti):";
            document.getElementById('r3').innerText = "மொத்தம் (Asal+Vatti):";
            document.getElementById('waBtn').innerText = "WhatsApp வழியாக பகிரவும்";
            document.getElementById('sTitle').innerText = "தமிழ்நாடு கிராமப்புற தனி மற்றும் கூட்டு வட்டி கணக்கீடு";
            
            calcTypeSelect.options[0].text = "ரூபாய்/பைசா வட்டி (தனி வட்டி / மாதத்திற்கு)";
            calcTypeSelect.options[1].text = "Bank வட்டி (கூட்டு வட்டி / ஆண்டிற்கு)";
        }

        updatePlaceholderAndLabels();

        if (document.getElementById('sd').value && document.getElementById('ed').value) {
            calcRunMath();
        }
    }
</script>
</body>
</html>
