<div class="input-container">
    <!-- Principal Input with automatic comma formatting -->
    <div class="g">
        <label id="l1">அசல் தொகை (Principal):</label>
        <!-- Use type="text" to allow formatting commas safely -->
        <input type="te<script>
    // Global tracking language state
    let isTamil = true; 

    // Dynamic Live Comma Formatting for Indian Currency System (As User Types)
    function formatAsalCommas(input) {
        // Strip out any characters that aren't numeric digits
        let value = input.value.replace(/,/g, '');
        if(!isNaN(value) && value !== '') {
            // Apply Indian numbering format rules natively
            let formatted = parseFloat(value).toLocaleString('en-IN');
            input.value = formatted;
        } else {
            input.value = '';
        }
    }

    // Main Calculator Function
    function calcRunMath() {
        // Safely extract numeric value from the comma-formatted principal text input
        const asalRawText = document.getElementById('asal')?.value || '0';
        const pVal = parseFloat(asalRawText.replace(/,/g, '')) || 0;
        
        const rateVal = parseFloat(document.getElementById('vattiRate')?.value || 0);
        const cType = document.getElementById('calcType')?.value || 'roopa';

        const startDateInput = document.getElementById('sd').value;
        const endDateInput = document.getElementById('ed').value;

        // Form Validation Rules
        if (pVal <= 0 || rateVal <= 0) {
            alert(isTamil ? 'தயவுசெய்து சரியான அசல் மற்றும் வட்டி விகிதத்தை உள்ளிடவும்!' : 'Please enter a valid Principal and Interest Rate!');
            return;
        }
        if (!startDateInput || !endDateInput) {
            alert(isTamil ? 'தயவுசெய்து தேதிகளைத் தேர்ந்தெடுக்கவும்!' : 'Please select both dates!');
            return;
        }

        const d1 = new Date(startDateInput);
        const d2 = new Date(endDateInput);

        if (d2 < d1) {
            alert(isTamil ? 'முடிவுற்ற தேதி தொடங்கிய தேதியை விட அதிகமாக இருக்க வேண்டும்!' : 'End date must be after Start date!');
            return;
        }

        // Calculation of timeline differences (Years, Months, Days)
        let diffY = d2.getFullYear() - d1.getFullYear();
        let diffM = d2.getMonth() - d1.getMonth();
        let diffD = d2.getDate() - d1.getDate();

        if (diffD < 0) {
            diffM--;
            const prevMonth = new Date(d2.getFullYear(), d2.getMonth(), 0).getDate();
            diffD += prevMonth;
        }
        if (diffM < 0) {
            diffY--;
            diffM += 12;
        }

        // Standard Village Rule mapping logic: 30 Days equals 1 Month
        const totalMonths = (diffY * 12) + diffM + (diffD / 30);
        const totalYears = totalMonths / 12;

        let finalInterest = 0;
        let totalAmount = 0;

        if (cType === 'roopa') {
            // 1. Traditional Thani Vatti (Simple Interest per Month per 100 rupees)
            finalInterest = pVal * (rateVal / 100) * totalMonths;
            totalAmount = pVal + finalInterest;
        } else {
            // 2. Bank Vatti (Standard Annual Compound Interest - Kootu Vatti)
            // Assumes standard annual compounding cycle used by commercial banking institutions
            const annualRateDecimal = rateVal / 100;
            totalAmount = pVal * Math.pow((1 + annualRateDecimal), totalYears);
            finalInterest = totalAmount - pVal;
        }

        // Build localized time strings natively
        let parts = [];
        if (isTamil) {
            if (diffY > 0) parts.push(diffY === 1 ? `${diffY} ஆண்டு` : `${diffY} ஆண்டுகள்`);
            if (diffM > 0) parts.push(diffM === 1 ? `${diffM} மாதம்` : `${diffM} மாதங்கள்`);
            if (diffD > 0 || parts.length === 0) parts.push(diffD === 1 ? `${diffD} நாள்` : `${diffD} நாட்கள்`);
        } else {
            if (diffY > 0) parts.push(diffY === 1 ? `${diffY} Year` : `${diffY} Years`);
            if (diffM > 0) parts.push(diffM === 1 ? `${diffM} Month` : `${diffM} Months`);
            if (diffD > 0 || parts.length === 0) parts.push(diffD === 1 ? `${diffD} Day` : `${diffD} Days`);
        }
        let timeString = parts.join(', ');

        // Format numerical display elements using Indian currency style presets
        let displayInt = '₹' + finalInterest.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        let displayTot = '₹' + totalAmount.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});

        // Push calculated text layers back into DOM viewports
        document.getElementById('outTime').innerText = timeString;
        document.getElementById('outInterest').innerText = displayInt;
        document.getElementById('outTotal').innerText = displayTot;
        document.getElementById('out').style.display = 'block';
        
        // Fixed WhatsApp Share Builder String Component
        let methodText = "";
        if (isTamil) {
            methodText = cType === 'roopa' ? 'ரூபாய்/பைசா வட்டி (Thani Vatti)' : 'Bank வட்டி (Kootu Vatti)';
        } else {
            methodText = cType === 'roopa' ? 'Roopa/Paisa Vatti (Monthly)' : 'Bank Vatti (Annual Compound)';
        }

        let shareText = isTamil ? 
            `*வட்டி கணக்கீடு அறிக்கை*\n\nகணக்கீடு முறை: ${methodText}\nஅசல் தொகை: ₹${pVal.toLocaleString('en-IN')}\nகாலம்: ${timeString}\nவட்டி தொகை: ${displayInt}\nமொத்தம்: ${displayTot}` :
            `*Interest Calculation Report*\n\nMethod: ${methodText}\nPrincipal: ₹${pVal.toLocaleString('en-IN')}\nTime: ${timeString}\nInterest: ${displayInt}\nTotal: ${displayTot}`;
            
        // Repaired API string formatting path structure
        let waButton = document.getElementById('waBtn');
        waButton.href = "https://whatsapp.com" + encodeURIComponent(shareText);
        waButton.style.display = 'inline-block';
    }

    // Application Translation Controller Switcher
    function calcToggleLang() {
        const langBtn = document.getElementById('tg');
        const calcTypeSelect = document.getElementById('calcType');
        isTamil = !isTamil;

        if (!isTamil) {
            langBtn.innerText = "தமிழ் மொழிக்கு மாற்றவும்";
            document.getElementById('l1').innerText = "Principal Amount:";
            document.getElementById('l2').innerText = "Interest Rate (Vatti Rate):";
            document.getElementById('l3').innerText = "Interest Type:";
            document.getElementById('l4').innerText = "Start Date:";
            document.getElementById('l5').innerText = "End Date:";
            document.getElementById('btn').innerText = "Calculate Interest";
            document.getElementById('r1').innerText = "Duration:";
            document.getElementById('r2').innerText = "Interest (Vatti):";
            document.getElementById('r3').innerText = "Total (Principal+Vatti):";
            document.getElementById('waBtn').innerText = "Share via WhatsApp";
            document.getElementById('sTitle').innerText = "Rural Tamil Nadu Simple and Compound Interest Calculator";
            
            // Translate Select Options to English
            calcTypeSelect.options[0].text = "Roopa/Paisa Vatti (Per Month)";
            calcTypeSelect.options[1].text = "Bank Vatti (Per Year / Compound)";
        } else {
            langBtn.innerText = "Switch to English";
            document.getElementById('l1').innerText = "அசல் தொகை (Principal):";
            document.getElementById('l2').innerText = "வட்டி விகிதம் (Vatti Rate):";
            document.getElementById('l3').innerText = "வட்டி வகை (Interest Type):";
            document.getElementById('l4').innerText = "தொடங்கிய தேதி:";
            document.getElementById('l5').innerText = "முடிவுற்ற தேதி:";
            document.getElementById('btn').innerText = "வட்டியைக் கணக்கிடு";
            document.getElementById('r1').innerText = "காலம்:";
            document.getElementById('r2').innerText = "வட்டி (Vatti):";
            document.getElementById('r3').innerText = "மொத்தம் (Asal+Vatti):";
            document.getElementById('waBtn').innerText = "WhatsApp வழியாக பகிரவும்";
            document.getElementById('sTitle').innerText = "தமிழ்நாடு கிராமப்புற தனி மற்றும் கூட்டு வட்டி கணக்கீடு";
            
            // Translate Select Options back to Tamil
            calcTypeSelect.options[0].text = "ரூபாய்/பைசா வட்டி (மாதத்திற்கு)";
            calcTypeSelect.options[1].text = "Bank வட்டி (ஆண்டிற்கு / Kootu Vatti)";
        }

        // Live refresh logic update if calculations were already visible
        if (document.getElementById('sd').value && document.getElementById('ed').value) {
            calcRunMath();
        }
    }
</script>
