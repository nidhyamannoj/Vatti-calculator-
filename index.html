<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>வட்டி கணக்கீட்டாளர் - Interest Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f7f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .calculator-card {
            background: #ffffff;
            width: 100%;
            max-width: 460px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
            padding: 24px;
            border: 1px solid #eaeaea;
        }

        .title {
            color: #b31d1d;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* Top Segmented Tab Control */
        .calc-tabs {
            display: flex;
            background: #f0f2f3;
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 22px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            color: #666666;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: #ffffff;
            color: #b31d1d;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333333;
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            font-size: 15px;
            color: #444444;
            background-color: #ffffff;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #b31d1d;
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg fill='%23666666' height='24' viewBox='0 0 24 24' width='24' xmlns='http://w3.org'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 18px;
        }

        .submit-btn {
            width: 100%;
            background-color: #b31d1d;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #911616;
        }

        /* Result Presentation Block */
        .result-box {
            margin-top: 20px;
            padding: 16px;
            background-color: #fff9f9;
            border: 1px dashed #b31d1d;
            border-left: 4px solid #b31d1d;
            border-radius: 6px;
            display: none;
        }

        .result-box.active {
            display: block;
        }

        .result-line {
            font-size: 15px;
            margin-bottom: 8px;
            color: #333333;
        }

        /* Functional Share Layout */
        .share-btn {
            width: 100%;
            background-color: #25D366;
            color: white;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .share-btn:hover {
            background-color: #1ebd58;
        }

        .switch-lang {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #666666;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <div class="title" id="calcTitle">வட்டி கணக்கீட்டாளர்</div>
    
    <!-- Top Mode Switches -->
    <div class="calc-tabs">
        <button type="button" class="tab-btn active" id="tabThani" onclick="switchMode('thani')">தனி வட்டி (Simple)</button>
        <button type="button" class="tab-btn" id="tabKootu" onclick="switchMode('kootu')">கூட்டு வட்டி (Compound)</button>
    </div>

    <form id="vattiForm" onsubmit="runCalculation(event)">
        <!-- Principal -->
        <div class="form-group">
            <label id="lblAsal">அசல் தொகை (Asal):</label>
            <input type="number" id="asal" placeholder="எ.கா. 100000" required min="1">
        </div>

        <!-- Filtered Dropdown System -->
        <div class="form-group">
            <label id="lblVattiVagai">வட்டி வகை:</label>
            <select id="vattiVagai" onchange="adaptPlaceholder()">
                <option value="rupee">ரூபாய் / பைசா வட்டி (மாதத்திற்கு)</option>
                <option value="bank">Bank வட்டி % (ஆண்டிற்கு)</option>
            </select>
        </div>

        <!-- Dynamic Interest Rate Selector -->
        <div class="form-group">
            <label id="lblVattiVigitham">வட்டி விகிதம்:</label>
            <input type="text" id="vattiRate" placeholder="எ.கா. 2 (ரூ.2 வட்டிக்கு)" required>
        </div>

        <!-- Compound Frequency Selection Rule -->
        <div class="form-group" id="compoundFreqGroup" style="display: none;">
            <label id="lblFreq">கூட்டு வட்டி முறை (Compounding Period):</label>
            <select id="compoundFreq">
                <option value="12">மாதமொருமுறை (Monthly)</option>
                <option value="4">மூன்று மாதமொருமுறை (Quarterly)</option>
                <option value="2">ஆறு மாதமொருமுறை (Half-Yearly)</option>
                <option value="1" selected>ஆண்டிற்கு ஒருமுறை (Annually)</option>
            </select>
        </div>

        <!-- Dates fields -->
        <div class="form-group">
            <label id="lblStartDate">தொடங்கிய தேதி:</label>
            <input type="date" id="startDate" required>
        </div>

        <div class="form-group">
            <label id="lblEndDate">முடிவுற்ற தேதி:</label>
            <input type="date" id="endDate" required>
        </div>

        <button type="submit" class="submit-btn" id="btnCalculate">வட்டியைக் கணக்கிடு</button>
    </form>

    <!-- Calculation Outputs Section -->
    <div class="result-box" id="resultDisplay"></div>
    <button type="button" class="share-btn" id="btnShare" style="display: none;" onclick="sendWhatsApp()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.003 5.324 5.328 0 11.859 0c3.166.001 6.141 1.233 8.377 3.469 2.235 2.237 3.466 5.214 3.464 8.384-.003 6.536-5.328 11.86-11.859 11.86-.1.052-2.071-.05-3.056-.314L0 24zm6.177-3.693c1.076.638 2.232.975 3.425.976 5.433 0 9.85-4.414 9.853-9.845.002-2.63-1.023-5.101-2.885-6.964C14.76 2.612 12.289 1.58 9.66 1.58c-5.434 0-9.852 4.414-9.854 9.846-.001 1.25.333 2.474.966 3.535L.71 20.173l5.524-1.866zm10.742-5.47c-.287-.144-1.702-.84-1.966-.935-.264-.097-.456-.144-.648.144-.192.288-.744.936-.912 1.129-.168.192-.336.216-.624.072-.288-.145-1.215-.447-2.313-1.427-.855-.762-1.432-1.704-1.6-1.993-.168-.288-.018-.444.126-.587.13-.13.288-.337.432-.505.144-.169.192-.289.288-.481.097-.193.048-.361-.024-.505-.072-.144-.648-1.56-.888-2.136-.234-.564-.473-.488-.648-.497-.168-.008-.36-.01-.552-.01s-.504.071-.768.361c-.264.288-1.008.985-1.008 2.399 0 1.415 1.031 2.787 1.175 2.98.144.192 2.03 3.1 4.916 4.344.686.296 1.223.473 1.64.605.69.219 1.319.189 1.816.115.553-.083 1.703-.696 1.943-1.368.24-.672.24-1.25.168-1.368-.072-.119-.264-.192-.552-.337z"/></svg>
        வாட்ஸ்அப்பில் பகிர்க (WhatsApp Share)
    </button>

    <div class="switch-lang" id="langToggle" onclick="toggleLanguage()">Switch to English</div>
</div>
<script>
    // System application parameters
    let currentLang = 'ta';
    let currentMode = 'thani'; // 'thani' for Simple interest, 'kootu' for Compound
    let generatedSummaryText = ""; // Holds clean shared text for WhatsApp string mapping

    const translations = {
        ta: {
            title: "வட்டி கணக்கீட்டாளர்",
            asal: "அசல் தொகை (Asal):",
            vagal: "வட்டி வகை:",
            vigitham: "வட்டி விகிதம்:",
            start: "தொடங்கிய தேதி:",
            end: "முடிவுற்ற தேதி:",
            btn: "வட்டியைக் கணக்கிடு",
            toggle: "Switch to English",
            freqLabel: "கூட்டு வட்டி முறை (Compounding Period):",
            placeholderRupee: "எ.கா. 2 (ரூ.2 வட்டிக்கு)",
            placeholderBank: "எ.கா. 7.5 (% ஆண்டிற்கு)"
        },
        en: {
            title: "Interest Calculator",
            asal: "Principal Amount (Asal):",
            vagal: "Interest Type:",
            vigitham: "Interest Rate:",
            start: "Start Date:",
            end: "End Date:",
            btn: "Calculate Interest",
            toggle: "தமிழில் மாற்றவும்",
            freqLabel: "Compounding Period:",
            placeholderRupee: "e.g. 2 (for Rs.2 Vatti)",
            placeholderBank: "e.g. 7.5 (% Per Annum)"
        }
    };

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('tabThani').classList.toggle('active', mode === 'thani');
        document.getElementById('tabKootu').classList.toggle('active', mode === 'kootu');
        
        // Hide/Show Compound Frequency Selection inputs natively
        const freqGroup = document.getElementById('compoundFreqGroup');
        if (mode === 'kootu') {
            freqGroup.style.display = 'block';
        } else {
            freqGroup.style.display = 'none';
        }
        
        // Dynamic placeholder reset after mode mutation updates
        adaptPlaceholder();
        document.getElementById('resultDisplay').classList.remove('active');
        document.getElementById('btnShare').style.display = 'none';
    }

    function adaptPlaceholder() {
        const type = document.getElementById('vattiVagai').value;
        const rateInput = document.getElementById('vattiRate');
        
        if (type === 'rupee') {
            rateInput.placeholder = translations[currentLang].placeholderRupee;
        } else {
            rateInput.placeholder = translations[currentLang].placeholderBank;
        }
    }

    function toggleLanguage() {
        currentLang = (currentLang === 'ta') ? 'en' : 'ta';
        const t = translations[currentLang];
        
        document.getElementById('calcTitle').innerText = t.title;
        document.getElementById('lblAsal').innerText = t.asal;
        document.getElementById('lblVattiVagai').innerText = t.vagal;
        document.getElementById('lblVattiVigitham').innerText = t.vigitham;
        document.getElementById('lblStartDate').innerText = t.start;
        document.getElementById('lblEndDate').innerText = t.end;
        document.getElementById('btnCalculate').innerText = t.btn;
        document.getElementById('langToggle').innerText = t.toggle;
        document.getElementById('lblFreq').innerText = t.freqLabel;
        
        adaptPlaceholder();
    }

    function runCalculation(event) {
        event.preventDefault();
        
        const principal = parseFloat(document.getElementById('asal').value);
        const rate = parseFloat(document.getElementById('vattiRate').value);
        const type = document.getElementById('vattiVagai').value;
        const startStr = document.getElementById('startDate').value;
        const endStr = document.getElementById('endDate').value;

        if (!startStr || !endStr || isNaN(principal) || isNaN(rate)) return;

        const start = new Date(startStr);
        const end = new Date(endStr);
        
        if (end < start) {
            alert(currentLang === 'ta' ? "முடிவுற்ற தேதி தொடங்கிய தேதியை விட அதிகமாக இருக்க வேண்டும்!" : "End date must be after Start date!");
            return;
        }

        // Structural breakdowns of chronological time blocks
        let years = end.getFullYear() - start.getFullYear();
        let months = end.getMonth() - start.getMonth();
        let days = end.getDate() - start.getDate();

        if (days < 0) {
            months -= 1;
            const prevMonthMax = new Date(end.getFullYear(), end.getMonth(), 0).getDate();
            days += prevMonthMax;
        }
        if (months < 0) {
            years -= 1;
            months += 12;
        }

        // Standard time computation metrics for both engines
        const totalMonths = (years * 12) + months + (days / 30);
        const totalYears = totalMonths / 12;

        let monthlyRateConverted = 0;
        if (type === 'rupee') {
            monthlyRateConverted = rate; // given directly per month for Rs. 100
        } else {
            monthlyRateConverted = rate / 12; // Bank per annum split down to months
        }

        let interest = 0;
        let totalAmount = 0;
        const modeLabelText = (currentMode === 'thani') ? 
            (currentLang === 'ta' ? "தனி வட்டி" : "Simple Interest") : 
            (currentLang === 'ta' ? "கூட்டு வட்டி" : "Compound Interest");

        if (currentMode === 'thani') {
            // Simple engine calculation tracking
            interest = (principal / 100) * monthlyRateConverted * totalMonths;
            totalAmount = principal + interest;
        } else {
            // Compound engine calculation tracking
            if (type === 'rupee') {
                // Village compound interest logic using monthly interest rules
                const timesCompoundedPerYear = parseInt(document.getElementById('compoundFreq').value);
                
                // Converting village monthly rates to effective per annum value
                const annualEquivalentPercentage = (rate * 12); 
                const compoundStepsPerYear = timesCompoundedPerYear; 
                
                totalAmount = principal * Math.pow((1 + (annualEquivalentPercentage / (100 * compoundStepsPerYear))), (compoundStepsPerYear * totalYears));
                interest = totalAmount - principal;
            } else {
                // Classic standard bank institutional formulation rules
                const timesCompoundedPerYear = parseInt(document.getElementById('compoundFreq').value);
                totalAmount = principal * Math.pow((1 + ((rate / 100) / timesCompoundedPerYear)), (timesCompoundedPerYear * totalYears));
                interest = totalAmount - principal;
            }
        }

        // Display update engine logic blocks
        const display = document.getElementById('resultDisplay');
        display.classList.add('active');

        const durationTextString = currentLang === 'ta' ? 
            `${years} வருடம், ${months} மாதம், ${days} நாட்கள்` : 
            `${years} Year(s), ${months} Month(s), ${days} Day(s)`;

        if (currentLang === 'ta') {
            display.innerHTML = `
                <div class="result-line"><strong>கணக்கீடு முறை:</strong> ${modeLabelText}</div>
                <div class="result-line"><strong>கால அளவு:</strong> ${durationTextString}</div>
                <div class="result-line"><strong>வட்டித் தொகை:</strong> ₹${interest.toFixed(2)}</div>
                <div class="result-line"><strong>மொத்தத் தொகை:</strong> ₹${totalAmount.toFixed(2)}</div>
            `;
            
            generatedSummaryText = `*வட்டி விபரங்கள் (${modeLabelText})*\n\nஅசல் தொகை: ₹${principal}\nகால அளவு: ${durationTextString}\nவட்டித் தொகை: ₹${interest.toFixed(2)}\nமொத்தத் தொகை: ₹${totalAmount.toFixed(2)}`;
        } else {
            display.innerHTML = `
                <div class="result-line"><strong>Calculation Type:</strong> ${modeLabelText}</div>
                <div class="result-line"><strong>Duration:</strong> ${durationTextString}</div>
                <div class="result-line"><strong>Interest Amount:</strong> ₹${interest.toFixed(2)}</div>
                <div class="result-line"><strong>Total Amount:</strong> ₹${totalAmount.toFixed(2)}</div>
            `;
            
            generatedSummaryText = `*Interest Details (${modeLabelText})*\n\nPrincipal: ₹${principal}\nDuration: ${durationTextString}\nInterest Amount: ₹${interest.toFixed(2)}\nTotal Amount: ₹${totalAmount.toFixed(2)}`;
        }

        // Expose correct WhatsApp share option visibility rules explicitly
        document.getElementById('btnShare').style.display = 'flex';
    }

    function sendWhatsApp() {
        if (!generatedSummaryText) return;
        const encodedText = encodeURIComponent(generatedSummaryText);
        window.open(`https://whatsapp.com{encodedText}`, '_blank');
    }
</script>
</body>
</html>
